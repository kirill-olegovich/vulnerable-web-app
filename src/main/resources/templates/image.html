<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head th:replace="fragments/header :: head"></head>
<title th:text="${metadata.getTitle()}"></title>
<body class="d-flex flex-column min-vh-100">
<header th:replace="fragments/header :: header"></header>

<div class="card mx-auto my-3" style="width: 50rem;">
    <div class="card-body">
        <h3 class="card-title" th:text="${metadata.getTitle()}"></h3>
        <p class="card-text">Author: <a th:href="@{'/user/' + ${metadata.getAuthor()}}"
                                        th:text="${metadata.getAuthor()}" class="text-decoration-none"></a>
        </p>
        <p class="card-text">
            <small th:text="'Size: ' + ${metadata.getSize()}" class="text-muted"></small>
        </p>
        <p class="card-text">
            <small th:text="'Published at ' + ${metadata.getCreatedAt()}" class="text-muted"></small>
        </p>
<!--        <p class="card-text">-->
<!--            <small th:text="'Updated at ' + ${metadata.getUpdatedAt()}" class="text-muted"></small>-->
<!--        </p>-->
<!--        <p th:utext="${metadata.getDescription()}" class="card-text"></p>-->

        <img th:src="@{'/images/' + ${metadata.getPath()}}" />


    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
